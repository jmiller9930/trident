<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trident Web — Skeleton</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }
    </style>
  </head>
  <body>
    <h1>Trident Web (100A skeleton)</h1>
    <p id="api-health">Checking API…</p>
    <script src="config.js"></script>
    <script>
      (function () {
        var pub = window.__TRIDENT_PUBLIC_BASE_URL__;
        var base = window.__TRIDENT_BASE_PATH__ || "";
        var url;
        if (pub) {
          url = pub.replace(/\/?$/, "") + "/api/health";
        } else {
          url = window.location.origin + base + "/api/health";
        }
        fetch(url)
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            document.getElementById("api-health").textContent =
              "API /api/health via " + url + " → " + JSON.stringify(j);
          })
          .catch(function (e) {
            document.getElementById("api-health").textContent =
              "API unreachable (" + url + "): " + e;
          });
      })();
    </script>
  </body>
</html>
