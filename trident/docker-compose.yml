# Resource limits use Compose-supported `cpus` / `mem_limit` (enforced by Docker Compose v2+).
# Tune via host sizing; increase chroma/api if embedding workloads OOM.
services:
  trident-db:
    image: postgres:16-alpine
    container_name: trident-db
    restart: unless-stopped
    cpus: 1.5
    mem_limit: 768m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trident}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-trident}
    volumes:
      - trident_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trident -d trident"]
      interval: 5s
      timeout: 5s
      retries: 10

  trident-chroma:
    image: chromadb/chroma:0.5.23
    container_name: trident-chroma
    restart: unless-stopped
    cpus: 2
    mem_limit: 3g
    environment:
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - trident_chroma_data:/chroma/chroma
    ports:
      - "8002:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 35s

  trident-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trident-api
    restart: unless-stopped
    cpus: 2
    mem_limit: 2g
    ports:
      - "8000:8000"
    environment:
      TRIDENT_ENV: ${TRIDENT_ENV:-development}
      TRIDENT_LOG_LEVEL: ${TRIDENT_LOG_LEVEL:-INFO}
      TRIDENT_DB_HOST: trident-db
      TRIDENT_DB_PORT: "5432"
      TRIDENT_DB_NAME: ${POSTGRES_DB:-trident}
      TRIDENT_DB_USER: ${POSTGRES_USER:-trident}
      TRIDENT_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      TRIDENT_CHROMA_HOST: trident-chroma
      TRIDENT_CHROMA_PORT: "8000"
      TRIDENT_BASE_PATH: ${TRIDENT_BASE_PATH:-}
      TRIDENT_PUBLIC_BASE_URL: ${TRIDENT_PUBLIC_BASE_URL:-}
    depends_on:
      trident-db:
        condition: service_healthy
      trident-chroma:
        condition: service_healthy

  trident-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trident-web
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    ports:
      - "${TRIDENT_WEB_PORT:-3000}:80"
    environment:
      TRIDENT_BASE_PATH: ${TRIDENT_BASE_PATH:-}
      TRIDENT_PUBLIC_BASE_URL: ${TRIDENT_PUBLIC_BASE_URL:-}
    depends_on:
      trident-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:80/ | grep -q Trident",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  trident-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: trident-worker
    restart: unless-stopped
    cpus: 1
    mem_limit: 1g
    environment:
      TRIDENT_ENV: ${TRIDENT_ENV:-development}
      TRIDENT_LOG_LEVEL: ${TRIDENT_LOG_LEVEL:-INFO}
      TRIDENT_DB_HOST: trident-db
      TRIDENT_DB_PORT: "5432"
      TRIDENT_DB_NAME: ${POSTGRES_DB:-trident}
      TRIDENT_DB_USER: ${POSTGRES_USER:-trident}
      TRIDENT_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      TRIDENT_NIKE_POLL_SEC: ${TRIDENT_NIKE_POLL_SEC:-2}
      TRIDENT_NIKE_MAX_ATTEMPTS: ${TRIDENT_NIKE_MAX_ATTEMPTS:-5}
      TRIDENT_NIKE_RETRY_BACKOFF_SEC: ${TRIDENT_NIKE_RETRY_BACKOFF_SEC:-1}
    depends_on:
      trident-db:
        condition: service_healthy
      trident-api:
        condition: service_healthy

  trident-exec:
    build:
      context: ./exec
      dockerfile: Dockerfile
    container_name: trident-exec
    restart: unless-stopped
    cpus: 1
    mem_limit: 512m
    ports:
      - "8010:8010"
    depends_on:
      trident-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  trident_db_data:
  trident_chroma_data:
